services:
  - type: web
    name: jazline-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DB_NAME
        value: jazline
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

  - type: web
    name: jazline-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve dist -s -p $PORT
    envVars:
      - key: EXPO_PUBLIC_BACKEND_URL
        fromService:
          type: web
          name: jazline-backend
          property: host
